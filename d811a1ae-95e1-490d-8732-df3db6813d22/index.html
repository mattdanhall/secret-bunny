<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secret Bunny 2026</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fdf6e3;
      font-family: Georgia, "Times New Roman", serif;
      color: #5b4636;
      padding: 2rem;
      text-align: center;
    }
    .egg { font-size: min(30vw, 180px); line-height: 1; }
    h1 {
      font-size: clamp(1.5rem, 4.5vw, 2.5rem);
      margin-top: 0.5em;
    }
    .assignment {
      margin-top: 1em;
      font-size: clamp(1.1rem, 3vw, 1.6rem);
      line-height: 1.6;
    }
    .name {
      font-weight: bold;
      color: #b5651d;
    }
    .footer {
      margin-top: 2em;
      font-size: 0.9rem;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="egg">🥚</div>
  <h1>Secret Bunny 2026</h1>
  <p class="assignment">
    <span class="name">Ffi</span>, you are the secret bunny for
    <span class="name">Ed</span>!<br>
    Get them a good egg!
  </p>
  <p class="footer">Keep it secret. Keep it chocolate.</p>
</body>
</html>
